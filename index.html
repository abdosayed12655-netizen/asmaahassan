<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asmaa Hassan | Skincare Store</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #fcf8f5; color: #4a4a4a; }
        header { background-color: #ffffff; padding: 10px 20px; box-shadow: 0 2px 10px rgba(216, 181, 169, 0.3); }
        .logo-area h1 { color: #bc7c65; text-align: center; }
        .admin-panel { background-color: #fff1eb; border: 2px dashed #bc7c65; padding: 20px; max-width: 600px; margin: 30px auto; border-radius: 12px; }
        .admin-panel input, .admin-panel button { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #e8c5b8; border-radius: 5px; }
        .admin-panel button { background-color: #bc7c65; color: white; cursor: pointer; border: none; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 20px; max-width: 1200px; margin: auto; }
        .product-card { background: #ffffff; border-radius: 12px; padding: 20px; box-shadow: 0 6px 15px rgba(216, 181, 169, 0.15); }
    </style>
</head>
<body>

    <header>
        <div class="logo-area"><h1>ASMAA HASSAN</h1></div>
    </header>

    <div class="admin-panel">
        <h3>إضافة منتجات (تظهر للجميع فوراً) ✨</h3>
        <input type="text" id="newProdTitle" placeholder="اسم المنتج">
        <input type="number" id="newProdPrice" placeholder="السعر">
        <input type="text" id="newProdImg" placeholder="رابط الصورة">
        <button onclick="addNewProductToFirebase()">إضافة المنتج 🚀</button>
    </div>

    <section class="products-grid" id="productsContainer">
        <div id="loadingText">جاري تحميل المنتجات...</div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://asmaa-hassan-store-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("shared_products");

        db.on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('productsContainer');
            container.innerHTML = '';
            if (data) {
                for (let id in data) {
                    const prod = data[id];
                    container.innerHTML += `<div class="product-card"><h3>${prod.title}</h3><p>${prod.price} ج.م</p></div>`;
                }
            }
        });

        function addNewProductToFirebase() {
            const title = document.getElementById('newProdTitle').value;
            const price = document.getElementById('newProdPrice').value;
            const img = document.getElementById('newProdImg').value;
            db.push({ title, price, img });
            alert("تم الإضافة بنجاح!");
        }
    </script>
</body>
</html>
